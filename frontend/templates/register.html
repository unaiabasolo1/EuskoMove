{% extends "base.html" %}
{% block title %}Registro · EuskoMove{% endblock %}
{% block content %}
<div class="container section form-page">
  <div class="form-card card">
    <h1>Crear cuenta</h1>
    <form method="post" action="{{ url_for('auth.do_register') }}" novalidate>
      <div class="field-group"><label for="name">Nombre completo</label>
        <input type="text" name="name" id="name" value="{{ name }}" required autocomplete="name"></div>
      <div class="field-group"><label for="email">Email</label>
        <input type="email" name="email" id="email" value="{{ email }}" required autocomplete="email"></div>
      <div class="field-group"><label for="password">Contraseña</label>
        <input type="password" name="password" id="password" required autocomplete="new-password"></div>
      <div class="field-group"><label for="password2">Repite la contraseña</label>
        <input type="password" name="password2" id="password2" required autocomplete="new-password"></div>
      <button type="submit" class="btn btn-primary btn-full">Crear cuenta</button>
    </form>
    <p class="form-alt small">¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Entra aquí</a></p>
  </div>
</div>
{% endblock %}
