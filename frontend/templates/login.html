{% extends "base.html" %}
{% block title %}Entrar · EuskoMove{% endblock %}
{% block content %}
<div class="container section form-page">
  <div class="form-card card">
    <h1>Iniciar sesión</h1>
    <p class="muted small">Demo: <code>admin@euskomove.eus</code> / <code>admin123</code></p>
    <form method="post" action="{{ url_for('auth.do_login') }}" novalidate>
      <input type="hidden" name="next" value="{{ next }}">
      <div class="field-group"><label for="email">Email</label>
        <input type="email" name="email" id="email" value="{{ email }}" required autocomplete="email"></div>
      <div class="field-group"><label for="password">Contraseña</label>
        <input type="password" name="password" id="password" required autocomplete="current-password"></div>
      <button type="submit" class="btn btn-primary btn-full">Entrar</button>
    </form>
    <p class="form-alt small">¿No tienes cuenta? <a href="{{ url_for('auth.register') }}">Regístrate gratis</a></p>
  </div>
</div>
{% endblock %}
