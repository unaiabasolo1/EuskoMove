name: Secret Scan
on:
  push:
    branches: ["**"]
  workflow_dispatch:
jobs:
  gitleaks:
    name: Gitleaks - Detectar secretos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Ejecutar Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}