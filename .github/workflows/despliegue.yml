name: terraform-deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Acción de Terraform"
        required: true
        default: "apply"
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    outputs:
      web_app_name: ${{ steps.tfout.outputs.web_app_name }}
      web_app_url: ${{ steps.tfout.outputs.web_app_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ./infra
        run: terraform init

      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'plan' }}
        working-directory: ./infra
        run: terraform plan -var-file="terraform.tfvars"

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: ./infra
        run: terraform apply -auto-approve -var-file="terraform.tfvars"

      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        working-directory: ./infra
        run: terraform destroy -auto-approve -var-file="terraform.tfvars"

      - name: Capture Terraform outputs
        if: ${{ github.event.inputs.action != 'destroy' }}
        id: tfout
        working-directory: ./infra
        run: |
          echo "web_app_name=$(terraform output -raw web_app_name)" >> $GITHUB_OUTPUT
          echo "web_app_url=$(terraform output -raw web_app_url)" >> $GITHUB_OUTPUT

      - name: Show URL
        if: ${{ github.event.inputs.action != 'destroy' }}
        run: echo "App URL: ${{ steps.tfout.outputs.web_app_url }}"

  deploy:
    runs-on: ubuntu-latest
    needs: terraform
    if: ${{ github.event.inputs.action == 'apply' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy app
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.terraform.outputs.web_app_name }}
          package: .

      - name: Final URL
        run: echo "URL final: ${{ needs.terraform.outputs.web_app_url }}"