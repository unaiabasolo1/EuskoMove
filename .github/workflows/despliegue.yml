name: Despliegue completo (Infra + App)

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  # ── JOB 1: TERRAFORM ──────────────────────────────────────────────────────
  terraform:
    name: Terraform - Infraestructura
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init
        working-directory: ./infra

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: ./infra

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ./infra

      - name: Guardar outputs
        id: outputs
        run: |
          echo "web_url=$(terraform output -raw web_app_url 2>/dev/null || echo 'no-output')" >> $GITHUB_OUTPUT
        working-directory: ./infra
        continue-on-error: true

      - name: Mostrar URL
        run: |
          echo "Terraform aplicado correctamente"
          echo "URL: ${{ steps.outputs.outputs.web_url }}"

  # ── JOB 2: DEPLOY APP ─────────────────────────────────────────────────────
  deploy:
    name: Deploy - Aplicación Flask
    runs-on: ubuntu-latest
    needs: terraform
    if: success()

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy a Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'euskomove-dev-57iy2a'
          slot-name: 'Production'
          package: .

  # ── JOB 3: RESULTADO ──────────────────────────────────────────────────────
  resultado:
    name: Resultado final
    runs-on: ubuntu-latest
    needs: [terraform, deploy]
    if: always()
    steps:
      - name: Mostrar enlace final
        run: |
          echo "═══════════════════════════════════════════════"
          echo "DESPLIEGUE COMPLETADO"
          echo "═══════════════════════════════════════════════"
          echo "URL: https://euskomove-dev-57iy2a.azurewebsites.net"
          echo "═══════════════════════════════════════════════"