name: Despliegue completo (Infra + App)

on:
  workflow_dispatch:  # Botón manual
  push:
    branches: [main]

jobs:
  # ============================================
  # JOB 1: TERRAFORM (Infraestructura)
  # ============================================
  terraform:
    name: Terraform - Infraestructura
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init
        working-directory: ./infra  # Tu main.tf está aquí

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: ./infra

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ./infra

      - name: Guardar outputs
        id: outputs
        run: |
          echo "web_url=$(terraform output -raw web_url 2>/dev/null || echo 'no-output')" >> $GITHUB_OUTPUT
          echo "app_url=$(terraform output -raw app_url 2>/dev/null || echo 'no-output')" >> $GITHUB_OUTPUT
        working-directory: ./infra
        continue-on-error: true

      - name: Mostrar URLs (Terraform)
        run: |
          echo "Terraform aplicado correctamente"
          echo "Web URL: ${{ steps.outputs.outputs.web_url }}"
          echo "App URL: ${{ steps.outputs.outputs.app_url }}"

  # ============================================
  # JOB 2: DEPLOY de la aplicación
  # ============================================
  deploy:
    name: Deploy - Aplicación
    runs-on: ubuntu-latest
    needs: terraform  # Espera a que Terraform termine
    if: success()      # Solo si Terraform fue bien

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Backend a Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'euskomove-backend'  # Cambia por tu Web App
          package: './backend'
      
      - name: Deploy Frontend a Azure Static Web App
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"
          output_location: "."

  # ============================================
  # JOB 3: RESULTADO FINAL
  # ============================================
  resultado:
    name: Resultado final
    runs-on: ubuntu-latest
    needs: [terraform, deploy]
    if: always()
    steps:
      - name: Mostrar enlaces finales
        run: |
          echo "═══════════════════════════════════════════════"
          echo "DESPLIEGUE COMPLETADO"
          echo "═══════════════════════════════════════════════"
          echo ""
          echo "ACCEDE A TU PÁGINA:"
          echo "   https://euskomove-backend.azurewebsites.net"
          echo "   https://tusitio.azurestaticapps.net"
          echo ""
          echo "═══════════════════════════════════════════════"
      
      - name: Crear comentario en el workflow (URL)
        uses: actions/github-script@v7
        with:
          script: |
            const url = "https://euskomove-backend.azurewebsites.net";
            console.log(`URL: ${url}`);
            core.setOutput("url", url);